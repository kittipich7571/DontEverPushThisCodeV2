name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# TODO#0: DONE — workflow-level permissions scoped to least privilege
permissions:
  contents: read          # TODO#0:  read source code
  security-events: write  # TODO#0a: upload SARIF to GitHub Security tab
  issues: write           # TODO#0b: comment on issues
  pull-requests: write    # TODO#0b: comment on PRs
  id-token: write         # TODO#0c: OIDC token for cloud auth
  actions: read           # needed by some upload-sarif actions

jobs:
  # ─────────────────────────────────────────────
  # GATE#0: Secret scanning (TruffleHog + Gitleaks)
  # ─────────────────────────────────────────────
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#1: DONE — fetch full history so TruffleHog can diff base..HEAD
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          # TODO#2: DONE — scan only the commit diff (not entire repo every run)
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}
          # TODO#3: DONE — only report secrets TruffleHog can verify as live creds
          extra_args: --only-verified

      # TODO#4: DONE — Gitleaks step (regex-based pattern matching)
      # Q: TruffleHog verifies live creds → fewer false positives but may miss undeployed secrets.
      #    Gitleaks matches regex patterns → more false positives but catches anything that *looks* like a secret.
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'

  # ─────────────────────────────────────────────
  # GATE#1a: SAST via SonarQube
  # ─────────────────────────────────────────────
  sast-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # TODO#5: DONE — full history required for Sonar blame / new-code detection
          fetch-depth: 0

      # TODO#6: DONE — SonarQube scan
      # Q: Findings appear in SonarCloud dashboard, NOT GitHub Security tab,
      #    because SonarCloud uses its own proprietary results format (not SARIF).
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────
  # GATE#1b: SAST via CodeQL (results in GitHub Security tab)
  # ─────────────────────────────────────────────
  codeql-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    strategy:
      matrix:
        # TODO#7: DONE — javascript covers both Next.js API routes and React TSX/JSX
        language: [ 'javascript' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # TODO#8: DONE — enable both suites
          # security-extended   → OWASP / CWE Top 25 + extra vuln checks
          # security-and-quality → security-extended + maintainability / code-quality rules
          # Q: Use both so you catch security bugs AND code-quality issues that can become attack vectors.
          queries: security-extended,security-and-quality

      # TODO#9: DONE — analyze step with per-language category
      # Q: Without a unique category, two matrix languages would overwrite each other's
      #    SARIF in the Security tab, making one set of results disappear.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────────
  # GATE#2: Dependency scanning via OWASP Dependency-Check
  # ─────────────────────────────────────────────
  dependency-scanning:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#10: DONE — set up Node 20 so Dependency-Check can resolve the full npm tree
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # TODO#11: DONE — install dependencies before scanning
      - name: Install npm dependencies
        run: npm ci

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        id: Depcheck
        with:
          project: 'DontEverPushThisCodeV2'
          path: '.'
          # TODO#12: DONE — SARIF integrates with GitHub Security tab
          format: 'SARIF'
          out: 'reports'
          # TODO#13: DONE — CVSS 7.0 is the boundary between MEDIUM (< 7.0) and HIGH (≥ 7.0)
          args: >
            --failOnCVSS 7.0
            --enableRetired

      # TODO#14: DONE — upload Depcheck SARIF to GitHub Security tab
      - name: Upload Depcheck SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      # TODO#15: DONE — upload raw report folder as downloadable artifact
      - name: Upload Depcheck report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/

  # ─────────────────────────────────────────────
  # GATE#3: Container scanning via Trivy
  # ─────────────────────────────────────────────
  image-scanning:
    runs-on: ubuntu-latest
    needs: [dependency-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO#16: DONE — build Docker image before scanning
      - name: Build Docker image
        run: docker build -t my-app:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'my-app:latest'
          # TODO#17: DONE — sarif format integrates with GitHub Security tab
          format: 'sarif'
          output: 'trivy-results.sarif'
          # TODO#18: DONE — report CRITICAL and HIGH only; LOW/MEDIUM are noisy and
          #          rarely actionable enough to block a build
          severity: 'CRITICAL,HIGH'
          # TODO#19: DONE — include CVEs with no available fix so we have full visibility,
          #          but don't block the build on them (continue-on-error above handles that)
          ignore-unfixed: 'false'

      # TODO#20: DONE — upload Trivy SARIF to GitHub Security tab
      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # TODO#21: DONE — upload raw SARIF as downloadable artifact
      - name: Upload Trivy SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

  # GATE#4: IaC scanning — skipped (no IaC in this repo)
  # GATE#5: DAST — covered separately in OWASP ZAP workshop